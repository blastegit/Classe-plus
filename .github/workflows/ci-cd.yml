# Pipeline CI/CD - Classe-plus
# Se déclenche à chaque push sur main

name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  # ---- Étape 1 : Lint avec Flake8 ----
  flake8:
    name: Flake8 - Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer flake8
        run: pip install flake8

      - name: Lancer Flake8
        run: flake8 .

  # ---- Étape 2 : Analyse statique SonarCloud (SAST) ----
  sonar:
    name: SonarCloud - SAST
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---- Étape 3 : Scan des dépendances (pip-audit) ----
  pip-audit:
    name: pip-audit - Dépendances vulnérables
    runs-on: ubuntu-latest
    needs: flake8
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les deps + pip-audit
        run: |
          pip install -r requirements.txt
          pip install pip-audit

      - name: Lancer pip-audit
        run: pip-audit

  # ---- Étape 4 : OWASP ZAP - Scan dynamique (DAST) ----
  zap:
    name: OWASP ZAP - DAST
    runs-on: ubuntu-latest
    needs: [sonar, pip-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer l'appli en arrière-plan
        run: |
          python app.py &
          sleep 5

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:5000'
          rules_file_name: '.zap-rules.tsv'
          cmd_options: '-a'
          allow_issue_writing: false

  # ---- Étape 5 : Build Docker ----
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [sonar, pip-audit]
    steps:
      - uses: actions/checkout@v4

      - name: Build de l'image
        run: docker build -t classe-plus:latest .

      - name: Vérification de l'image
        run: docker images classe-plus:latest

  # ---- Étape 6 : Déploiement via Docker Compose ----
  deploy:
    name: Déploiement
    runs-on: ubuntu-latest
    needs: [build, zap]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Déploiement sur le serveur
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/classe-plus
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Déploiement terminé"